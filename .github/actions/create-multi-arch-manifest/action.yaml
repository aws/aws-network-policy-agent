name: Create Multi-Arch Manifest
description: >-
  Creates and pushes a multi-arch image index from per-arch images. The caller
  must configure AWS credentials before using this action.
inputs:
  aws-region:
    description: AWS region
    required: true
  image-uri-amd64:
    description: 'AMD64 image URI'
    required: true
  image-uri-arm64:
    description: 'ARM64 image URI'
    required: true
  image-tag:
    description: 'Tag for the multi-arch index (same base tag the per-arch images were built with)'
    required: true
outputs:
  manifest_uri:
    description: "Multi-arch manifest URI"
    value: ${{ steps.manifest.outputs.manifest_uri }}
runs:
  using: "composite"
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Create and Push Manifest
      id: manifest
      shell: bash
      env:
        REGION: ${{ inputs.aws-region }}
        IMAGE_AMD64: ${{ inputs.image-uri-amd64 }}
        IMAGE_ARM64: ${{ inputs.image-uri-arm64 }}
        IMAGE_TAG: ${{ inputs.image-tag }}
        AWS_ECR_REPO_NAME: amazon/aws-network-policy-agent
      run: |
        set -euo pipefail
        AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        AWS_ECR_REGISTRY="$AWS_ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com"
        MANIFEST_URI="$AWS_ECR_REGISTRY/$AWS_ECR_REPO_NAME:$IMAGE_TAG"

        aws ecr get-login-password --region "$REGION" | docker login --username AWS --password-stdin "$AWS_ECR_REGISTRY"

        # imagetools resolves per-arch manifests via the registry and handles OCI
        # media types correctly, unlike legacy `docker manifest create`.
        docker buildx imagetools create -t "$MANIFEST_URI" "$IMAGE_AMD64" "$IMAGE_ARM64"

        echo "manifest_uri=$MANIFEST_URI" >> $GITHUB_OUTPUT
