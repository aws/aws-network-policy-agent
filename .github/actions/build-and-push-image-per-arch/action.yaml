name: Build and Push Single-Arch Image
description: 'Builds a single-arch Network Policy Agent image on a native runner and pushes to ECR'
inputs:
  aws-region:
    description: AWS region
    required: true
  arch:
    description: 'Architecture (amd64 or arm64)'
    required: true
outputs:
  image_uri:
    description: "Architecture-specific image URI"
    value: ${{ steps.build.outputs.image_uri }}
runs:
  using: "composite"
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    - name: Build and Push Image
      id: build
      shell: bash
      env:
        REGION: ${{ inputs.aws-region }}
        ARCH: ${{ inputs.arch }}
        AWS_ECR_REPO_NAME: amazon/aws-network-policy-agent
      run: |
        IMAGE_VERSION=$(git rev-parse HEAD)
        AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        AWS_ECR_REGISTRY="$AWS_ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com"
        IMAGE_TAG="${IMAGE_VERSION}-${ARCH}"

        aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin ${AWS_ECR_REGISTRY}
        if ! aws ecr describe-repositories --registry-id $AWS_ACCOUNT_ID --repository-names $AWS_ECR_REPO_NAME >/dev/null 2>&1; then
          echo "creating ECR repo with name $AWS_ECR_REPO_NAME"
          aws ecr create-repository --repository-name $AWS_ECR_REPO_NAME
        fi

        IMAGE_URI="$AWS_ECR_REGISTRY/$AWS_ECR_REPO_NAME:$IMAGE_TAG"

        echo "Building Network Policy Agent image for $ARCH"
        docker buildx build \
          -f Dockerfile \
          --platform "linux/${ARCH}" \
          --cache-from=type=gha,scope=${ARCH} \
          --cache-to=type=gha,mode=max,scope=${ARCH} \
          -t "$IMAGE_URI" \
          --build-arg golang_image="$(cat .go-version | xargs -I{} echo public.ecr.aws/eks-distro-build-tooling/golang:{}-gcc-al2)" \
          --push \
          .

        echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT
